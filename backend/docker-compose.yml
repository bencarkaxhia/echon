version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: echon
      POSTGRES_PASSWORD: echon_dev_password
      POSTGRES_DB: echon_db
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "65379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: